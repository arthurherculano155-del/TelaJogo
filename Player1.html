<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Tabuada</title>
<link rel="stylesheet" href="Player2.css">
</head>
<body>

<div class="tela">

    <div class="container" id="game">

        <h1>TABUADA</h1>

        <div class="pergunta" id="pergunta">
            1 × 1
        </div>

        <input type="number" id="resposta">

        <br>

        <button onclick="verificar()">
            RESPONDER
        </button>

        <div class="info">
            <span><img src="MineHeart.png" alt=""> <p id="vidas">3</p></span>
            <span><img src="MinecraftCLock-removebg-preview.png" alt=""><p id="tempo">5</p></span>
        </div>


    </div>

    <div class="final" id="final">

        <h2>GAME OVER</h2>

        <p>Pontos: <span id="pontos"></span></p>

        <button onclick="location.reload()">
            JOGAR NOVAMENTE
        </button> <br>

        <a href="index.html">
        <button>VOLTAR AO LOBBY</button>
        </a>

    </div>

    <div class="ganhou" id="win">
        <p>VOCÊ GANHOU!!</p>
        <p>Pontos: 10</p>
        <button onclick="location.reload()">Jogar Novamente</button> <br>

        <a href="index.html">
        <button>VOLTAR AO LOBBY</button>
        </a>
    </div>

</div>

<script>

let n1;
let n2;
let resultado;

let vidas = 3;
let pontos = 0;
let tempo = 5;

const pergunta = document.getElementById("pergunta");
const respostaInput = document.getElementById("resposta");

function novaPergunta(){

    n1 = Math.floor(Math.random() * 10) + 1;
    n2 = Math.floor(Math.random() * 10) + 1;

    resultado = n1 * n2;

    pergunta.innerHTML = `${n1} × ${n2}`;

    respostaInput.value = "";

    tempo = 5;
    document.getElementById("tempo").innerHTML = tempo;
}

function verificar(){

    let valor = Number(respostaInput.value);

    if(valor === resultado){

        pontos++;

        novaPergunta();

    }else{

        perderVida();
    }

     if(pontos >= 10){
        tempo = 80000;

        document.getElementById("game").style.display = "none";
        document.getElementById("pontos").innerText = 10;

        document.getElementById("win").style.display = "flex";
    }
}

function perderVida(){

    vidas--;

    document.getElementById("vidas").innerHTML = vidas;

    if(vidas <= 0){

        gameOver();

    }else{

        novaPergunta();
    }
}

function gameOver(){

    document.getElementById("game").style.display = "none";

    let final = document.getElementById("final");

    final.style.display = "block";

    document.getElementById("pontos").innerHTML = pontos;
}

setInterval(()=>{

    tempo--;

    document.getElementById("tempo").innerHTML = tempo;

    if(tempo <= 0){

        perderVida();
    }

},1000);

window.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        verificar();
    }

});

novaPergunta();

</script>

</body>
</html>
